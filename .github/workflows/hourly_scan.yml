name: Hourly Stock Screener Scan

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 스캔 실행
        run: python scheduled_scan.py

      - name: 결과 파일 커밋 & 푸시
        run: |
          git config user.name "auto-scanner-bot"
          git config user.email "actions@github.com"
          git add latest_results.json
          git diff --quiet --cached || git commit -m "자동 스캔 결과 갱신 [skip ci]"
          git push
